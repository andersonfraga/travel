<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa - Arrume as Malas!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Animação do Cartão de Embarque Deslizando */
        .ticket-container {
            animation: slideUpFade 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            transform: translateY(50px);
            margin-top: 20px;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(100px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Design do Cartão de Embarque */
        .boarding-pass {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            max-width: 400px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            color: #333;
        }

        /* Cabeçalho da Companhia Aérea */
        .ticket-header {
            background: #1a237e;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Corpo principal do bilhete */
        .ticket-body {
            padding: 25px 20px;
            background: #fff;
        }

        /* Estilo da Rota (AMS -> ARN) */
        .route {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .route h2 {
            font-size: 2.5em;
            margin: 0;
            color: #1a237e;
        }
        .route p {
            margin: 0;
            font-size: 0.8em;
            color: #666;
            text-transform: uppercase;
        }
        .plane-icon {
            font-size: 2em;
            color: #ffb300;
        }

        /* Informações do Passageiro e Voo */
        .ticket-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            margin-bottom: 20px;
        }
        .label {
            font-size: 0.7em;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: block;
        }
        .value {
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
        }

        /* Canhoto / Código de Barras */
        .ticket-stub {
            border-top: 2px dashed #ccc;
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        /* Recortes laterais do picote (ajustados para serem transparentes/herdar o fundo) */
        .ticket-stub::before, .ticket-stub::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 20px;
            height: 20px;
            background: transparent;
            box-shadow: 0 0 0 20px #f9f9f9; /* Truque visual para o recorte sem depender de cor sólida no fundo */
            border-radius: 50%;
            clip-path: inset(10px 0 0 0); /* Esconde a parte de cima da sombra */
        }
        .ticket-stub::before { left: -10px; clip-path: polygon(100% 50%, 100% 100%, 0 100%, 0 50%); }
        .ticket-stub::after { right: -10px; clip-path: polygon(100% 50%, 100% 100%, 0 100%, 0 50%); }
        
        /* O "Destino Revelado" bem grande */
        .grand-reveal {
            font-size: 1.4em;
            color: #ffeb3b;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }
    </style>
</head>
