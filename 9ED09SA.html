<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa - Capturada!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Animação de pulsação suave para o coração-cadeado */
        .pulse-anim {
            animation: pulseHeart 2s infinite;
            transform-origin: center;
        }

        @keyframes pulseHeart {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plano infalível...</h1>
        
        <svg class="bear-head" width="150" height="150" viewBox="0 0 200 260">
            <circle cx="40" cy="80" r="35" fill="#f0f8ff"/>
            <circle cx="160" cy="80" r="35" fill="#f0f8ff"/>
            <circle cx="40" cy="80" r="20" fill="#e0f2f1"/>
            <circle cx="160" cy="80" r="20" fill="#e0f2f1"/>
            
            <ellipse cx="100" cy="130" rx="90" ry="80" fill="#f0f8ff"/>
            
            <path d="M 155 120 Q 180 110 190 125 Q 170 130 155 130 Z" fill="#37474f"/>
            <path d="M 155 125 Q 175 135 185 145 Q 165 140 150 135 Z" fill="#263238"/>
            <path d="M 35 115 Q 100 100 165 115 Q 175 135 160 140 Q 100 125 40 140 Q 25 135 35 115 Z" fill="#263238"/>
            <circle cx="75" cy="122" r="14" fill="#ffffff"/>
            <circle cx="125" cy="122" r="14" fill="#ffffff"/>

            <g class="bear-eyes">
                <circle cx="75" cy="122" r="7" fill="#2c3e50"/>
                <circle cx="125" cy="122" r="7" fill="#2c3e50"/>
            </g>

            <ellipse cx="100" cy="150" rx="45" ry="35" fill="#e0f2f1"/>
            <path d="M 85 140 Q 100 160 115 140 L 100 155 Z" fill="#2c3e50"/>

            <path d="M 25 175 Q 100 215 175 175 Q 165 200 100 210 Q 35 200 25 175 Z" fill="#d32f2f"/> 
            <path d="M 125 185 L 115 235 L 145 235 L 150 180 Z" fill="#b71c1c"/> 
            <line x1="120" y1="235" x2="118" y2="245" stroke="#b71c1c" stroke-width="3" stroke-linecap="round"/>
            <line x1="128" y1="235" x2="128" y2="245" stroke="#b71c1c" stroke-width="3" stroke-linecap="round"/>
            <line x1="136" y1="235" x2="137" y2="245" stroke="#b71c1c" stroke-width="3" stroke-linecap="round"/>
            <line x1="143" y1="235" x2="145" y2="245" stroke="#b71c1c" stroke-width="3" stroke-linecap="round"/>
        </svg>

        <div class="clue-area">
            <p>Neste destino nasceu uma síndrome famosíssima: aquela em que o refém se apaixona pelo sequestrador.<br />Essa surpresa pode ser considerada "sequestro?" 😂🥷</p>
            
            <svg width="120" height="120" viewBox="0 0 100 100" class="pulse-anim" style="margin-top: 15px;">
                <path d="M 50 85 C 50 85, 10 55, 10 30 C 10 15, 25 5, 40 15 C 50 22, 50 22, 50 22 C 50 22, 50 22, 60 15 C 75 5, 90 15, 90 30 C 90 55, 50 85, 50 85 Z" fill="#e53935"/>
                <path d="M 18 30 C 18 20, 25 12, 35 15 C 38 16, 40 18, 42 20 C 35 20, 25 28, 25 40 C 25 45, 27 50, 29 55 C 20 48, 18 38, 18 30 Z" fill="#ffcdd2" opacity="0.4"/>
                
                <circle cx="50" cy="40" r="8" fill="#1e1e24"/>
                <path d="M 46 42 L 54 42 L 52 58 L 48 58 Z" fill="#1e1e24"/>
                <circle cx="50" cy="58" r="2.5" fill="#1e1e24"/>
            </svg>
        </div>

        <div id="countdown-container" style="margin-top: 20px; min-height: 50px;">
            <p id="timer-text" style="font-size: 1.1em; color: #ffeb3b; font-weight: bold;">
                Próxima pista liberada em: <br>
                <span id="timer" style="font-size: 1.3em;">Calculando...</span>
            </p>
            <a id="next-clue-btn" class="next-btn" style="display: none;">Ver Próxima Pista</a>
        </div>

        <script src="clue.js"></script>
        <script>
            iniciarContador("pista9"); 
        </script>
    </div>
</body>
</html>
